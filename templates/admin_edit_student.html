{% extends 'admin_base.html' %}
{% set title = 'Edit Student | CCS Sit-in Monitoring' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="info-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Edit Student</h5>
        <a class="btn btn-outline-secondary btn-sm" href="/admin/students">Back</a>
      </div>

      <form method="POST" action="{{ url_for('admin_edit_student', id_number=student.id_number) }}">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">ID Number</label>
            <input type="text" class="form-control" value="{{ student.id_number }}" readonly>
          </div>
          <div class="col-md-6">
            <label class="form-label">Course</label>
            <input type="text" class="form-control" name="course" value="{{ student.course or '' }}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" name="last_name" value="{{ student.last_name or '' }}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" name="first_name" value="{{ student.first_name or '' }}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Middle Name</label>
            <input type="text" class="form-control" name="middle_name" value="{{ student.middle_name or '' }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Year Level</label>
            <input type="text" class="form-control" name="course_level" value="{{ student.course_level or '' }}" required>
          </div>
          <div class="col-md-9">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" value="{{ student.email or '' }}">
          </div>
          <div class="col-12">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" name="address" value="{{ student.address or '' }}">
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
          <a href="/admin/students" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
