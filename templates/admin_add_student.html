{% extends 'admin_base.html' %}
{% set title = 'Add Student | CCS Sit-in Monitoring' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="info-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Add Student</h5>
        <a class="btn-close" href="/admin/students" aria-label="Close"></a>
      </div>
      <form method="POST" action="{{ url_for('admin_add_student') }}">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">ID Number *</label>
            <input type="text" class="form-control" name="id_number" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Last Name *</label>
            <input type="text" class="form-control" name="last_name" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">First Name *</label>
            <input type="text" class="form-control" name="first_name" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Middle Name</label>
            <input type="text" class="form-control" name="middle_name">
          </div>
          <div class="col-md-4">
            <label class="form-label">Course *</label>
            <input type="text" class="form-control" name="course" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Year Level *</label>
            <input type="text" class="form-control" name="course_level" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email">
          </div>
          <div class="col-md-6">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" name="address">
          </div>
          <div class="col-md-6">
            <label class="form-label">Password *</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Confirm Password *</label>
            <input type="password" class="form-control" name="confirm_password" required>
          </div>
        </div>
        <div class="d-flex justify-content-end gap-2 mt-4">
          <a href="/admin/students" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary">Save Student</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
