<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile | CCS Sit-in Monitoring</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card p-4">
      <h3 class="mb-4">Edit Profile</h3>
      <form method="POST" action="/edit_profile" enctype="multipart/form-data">
        <div class="mb-3">
          <label for="first_name" class="form-label">First Name</label>
          <input type="text" class="form-control" id="first_name" name="first_name" value="{{ user.first_name }}" required>
        </div>
        <div class="mb-3">
          <label for="middle_name" class="form-label">Middle Name</label>
          <input type="text" class="form-control" id="middle_name" name="middle_name" value="{{ user.middle_name }}">
        </div>
        <div class="mb-3">
          <label for="last_name" class="form-label">Last Name</label>
          <input type="text" class="form-control" id="last_name" name="last_name" value="{{ user.last_name }}" required>
        </div>
        <div class="mb-3">
          <label for="course" class="form-label">Course</label>
          <input type="text" class="form-control" id="course" name="course" value="{{ user.course }}" required>
        </div>
        <div class="mb-3">
          <label for="course_level" class="form-label">Year Level</label>
          <input type="text" class="form-control" id="course_level" name="course_level" value="{{ user.course_level }}" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}">
        </div>
        <div class="mb-3">
          <label for="address" class="form-label">Address</label>
          <input type="text" class="form-control" id="address" name="address" value="{{ user.address }}">
        </div>
        <div class="mb-3">
          <label for="photo" class="form-label">Profile Photo</label>
          <input class="form-control" type="file" id="photo" name="photo" accept="image/png,image/jpeg,image/gif">
          <div class="form-text">Optional. If not set, your initials will be used.</div>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/dashboard" class="btn btn-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</body>
</html>
