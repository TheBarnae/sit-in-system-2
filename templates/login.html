<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | CCS Sit-in Monitoring</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-wrapper">
    <!-- Left brand panel -->
    <div class="auth-brand d-none d-md-flex">
      <img src="{{ url_for('static', filename='images/CCS_UC.png') }}" alt="CCS Logo">
      <h1>College of Computer Studies<br>Sit-in Monitoring System</h1>
      <p>University of Cebu</p>
    </div>

    <!-- Right form panel -->
    <div class="auth-form-side">
      <div class="auth-card fade-in">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your student account</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-auth">{{ message }}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST" action="/login_user">
          <div class="form-floating mb-3">
            <input type="text" class="form-control" id="id_number" name="id_number" placeholder="ID Number" required>
            <label for="id_number"><i class="bi bi-person-badge"></i> ID Number</label>
          </div>
          <div class="form-floating mb-4">
            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
            <label for="password"><i class="bi bi-lock"></i> Password</label>
          </div>
          <button type="submit" class="btn btn-auth">Sign In</button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="/register">Register</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
